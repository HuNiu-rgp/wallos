services:
  app:
    image: gege188/wallos:latest
    restart: unless-stopped
    ports:
      - "${WALLOS_HOST:-0.0.0.0}:${WALLOS_PORT:-8001}:80"
    volumes:
      - "${WALLOS_DATA_PATH:-./data}:/var/www/html/data"
      - "${WALLOS_STORAGE_PATH:-./storage}:/var/www/html/storage"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8001}"
      ASSET_URL: "${ASSET_URL:-${APP_URL:-http://localhost:8001}}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/data/database.sqlite
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"
      TZ: "${TZ:-Asia/Shanghai}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost/login"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  scheduler:
    image: gege188/wallos:latest
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - "${WALLOS_DATA_PATH:-./data}:/var/www/html/data"
      - "${WALLOS_STORAGE_PATH:-./storage}:/var/www/html/storage"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8001}"
      ASSET_URL: "${ASSET_URL:-${APP_URL:-http://localhost:8001}}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/data/database.sqlite
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"
      TZ: "${TZ:-Asia/Shanghai}"
    depends_on:
      app:
        condition: service_healthy
