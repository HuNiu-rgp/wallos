services:
  app:
    image: gege188/wallos:v1.0.4
    restart: unless-stopped
    ports:
      - "${WALLOS_PORT:-8001}:8000"
    volumes:
      - wallos-data:/var/www/html/database
      - wallos-storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8001}"
      ASSET_URL: "${ASSET_URL:-${APP_URL:-http://localhost:8001}}"
      DB_CONNECTION: sqlite
      DB_DATABASE: database.sqlite
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"
      TZ: "${TZ:-Asia/Shanghai}"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/login"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  scheduler:
    image: gege188/wallos:v1.0.4
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - wallos-data:/var/www/html/database
      - wallos-storage:/var/www/html/storage
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost:8001}"
      ASSET_URL: "${ASSET_URL:-${APP_URL:-http://localhost:8001}}"
      DB_CONNECTION: sqlite
      DB_DATABASE: database.sqlite
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"
      TZ: "${TZ:-Asia/Shanghai}"
    depends_on:
      app:
        condition: service_healthy

volumes:
  wallos-data:
  wallos-storage:
